name: zin

services:
  backend:
    build:
      context: ./apps/backend
      target: dev
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      POSTGRES_HOST: ${POSTGRES_HOST:-host.docker.internal}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-zin}
      POSTGRES_USER: ${POSTGRES_USER:-zin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zin_dev_password}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./apps/backend:/workspace
      - maven-cache:/root/.m2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["./mvnw", "spring-boot:run", "-Dspring-boot.run.profiles=dev"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - zin-dev

  web:
    build:
      context: ./apps/web
      target: dev
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${WEB_PORT:-5174}:5174"
    volumes:
      - ./apps/web:/app
      - web-node-modules:/app/node_modules
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 5174"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5174 >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      backend:
        condition: service_started
    networks:
      - zin-dev

networks:
  zin-dev:
    driver: bridge

volumes:
  maven-cache:
  web-node-modules:
